name: ALI Agreement Score Calculator
description: "Computes cosine-similarity agreement scores for ALI fields per market x year. Outputs latest, all-years, or both. ALI_C1_CONFIG hardcoded; REGIME_DIM configurable."

inputs:
  - {name: embeddings,     type: Data,    description: "Input directory containing the embeddings CSV file"}
  - {name: regime_dim,     type: Integer, default: "32",   description: "Dimensionality of each regime embedding vector"}
  - {name: output_mode,    type: String,  default: "both", description: "Output mode: latest, all, or both"}
  - {name: round_decimals, type: Integer, default: "6",    description: "Decimal places to round output agreement scores"}

outputs:
  - {name: ali_agreement_scores,          type: Data, description: "ali_agreement_scores.csv — latest year per market (indexed by market)"}
  - {name: ali_agreement_scores_all_years, type: Data, description: "ali_agreement_scores_all_years.csv — all years (no index)"}

implementation:
  container:
    image: gurpreetgandhi/nesy-factory:v1
    command:
      - python3
      - -u
      - -c
      - |
        import argparse, os, sys, json, logging
        import numpy as np
        import pandas as pd

        parser = argparse.ArgumentParser()
        parser.add_argument('--embeddings',                       required=True)
        parser.add_argument('--regime_dim',                       type=int, default=32)
        parser.add_argument('--output_mode',                      type=str, default='both',
                            choices=['latest', 'all', 'both'])
        parser.add_argument('--round_decimals',                   type=int, default=6)
        parser.add_argument('--ali_agreement_scores',             required=True)
        parser.add_argument('--ali_agreement_scores_all_years',   required=True)
        args = parser.parse_args()

        logging.basicConfig(stream=sys.stdout, level=logging.INFO)
        logger = logging.getLogger("ali_agreement_score_calculator")

        REGIME_DIM = args.regime_dim

        ALI_C1_CONFIG = {
            "D":  ("techprod",     ["coordination"], False),
            "IA": ("measurement",  ["operational"],  True),
            "CF": ("coordination", ["operational"],  True),
            "RP": ("regulatory",   ["techprod"],     False),
            "F":  ("coordination", ["incentive"],    True),
        }

        ALI_FIELDS = list(ALI_C1_CONFIG.keys())

        def resolve_csv_path(input_dir, stem):
            candidates = [
                os.path.join(input_dir, stem + ".csv"),
                os.path.join(input_dir, stem),
            ]
            for path in candidates:
                if os.path.isfile(path):
                    logger.info("Resolved input file: %s", path)
                    return path
            for fname in os.listdir(input_dir):
                if fname.endswith(".csv"):
                    path = os.path.join(input_dir, fname)
                    logger.warning("Fallback CSV file used: %s", path)
                    return path
            all_files = [f for f in os.listdir(input_dir) if os.path.isfile(os.path.join(input_dir, f))]
            if all_files:
                path = os.path.join(input_dir, all_files[0])
                logger.warning("Last-resort file used: %s", path)
                return path
            raise FileNotFoundError("No readable input file found in: %s  contents: %s" % (input_dir, os.listdir(input_dir)))

        def get_base_vec(row, regime):
            cols = [f"{regime}__{i}" for i in range(REGIME_DIM)]
            if not all(c in row for c in cols):
                return None
            return np.array([float(row[c]) for c in cols], dtype=np.float32)

        def safe_cosine(a, b):
            if a is None or b is None:
                return np.nan
            na, nb = np.linalg.norm(a), np.linalg.norm(b)
            if na == 0 or nb == 0 or not (np.isfinite(na) and np.isfinite(nb)):
                return np.nan
            return float(np.dot(a, b) / (na * nb))

        def compute_agreement_row(row):
            results = {}
            for field, (target, others, inverted) in ALI_C1_CONFIG.items():
                tgt = get_base_vec(row, target)
                if tgt is None:
                    results[field] = np.nan
                    continue
                sims = [safe_cosine(tgt, get_base_vec(row, o)) for o in others]
                sims = [s for s in sims if not np.isnan(s)]
                if sims:
                    raw = float(np.mean(sims))
                    results[field] = round((1.0 - raw) if inverted else raw, args.round_decimals)
                else:
                    results[field] = np.nan
            return results

        def compute_all(df):
            records = []
            for _, row in df.iterrows():
                d      = row.to_dict()
                scores = compute_agreement_row(d)
                record = {"market": row["market"], "year": int(row["year"])}
                record.update(scores)
                records.append(record)
            return pd.DataFrame(records)

        def get_latest_year(df_all):
            idx = df_all.groupby("market")["year"].idxmax()
            return df_all.loc[idx].drop(columns=["year"]).set_index("market")

        def report_nulls(df_latest):
            null_counts = df_latest.isna().sum()
            null_counts  = null_counts[null_counts > 0]
            if not null_counts.empty:
                logger.warning("Null ALI agreement scores detected:")
                for field, cnt in null_counts.items():
                    markets = df_latest[df_latest[field].isna()].index.tolist()
                    logger.warning("  %s (%d): %s", field, cnt, markets)
            else:
                logger.info("No null ALI agreement scores found.")

        try:
            logger.info("Scanning embeddings dir: %s  contents=%s", args.embeddings, os.listdir(args.embeddings))
            csv_path = resolve_csv_path(args.embeddings, "mock_embeddings")
            df_raw   = pd.read_csv(csv_path)
            assert "market" in df_raw.columns, "Missing 'market' column"
            assert "year"   in df_raw.columns, "Missing 'year' column"
            logger.info("Loaded shape=%s  regime_dim=%d  output_mode=%s", df_raw.shape, REGIME_DIM, args.output_mode)

            df_all    = compute_all(df_raw)
            df_latest = get_latest_year(df_all)

            logger.info("=== ALI Agreement Scores (latest year) ===")
            logger.info("%s", df_latest[ALI_FIELDS].round(4).to_string())
            report_nulls(df_latest)

            os.makedirs(args.ali_agreement_scores,            exist_ok=True)
            os.makedirs(args.ali_agreement_scores_all_years,  exist_ok=True)

            latest_path  = os.path.join(args.ali_agreement_scores,           "ali_agreement_scores.csv")
            all_yrs_path = os.path.join(args.ali_agreement_scores_all_years, "ali_agreement_scores_all_years.csv")

            mode = args.output_mode

            if mode in ("latest", "both"):
                df_latest.round(args.round_decimals).to_csv(latest_path)
                logger.info("Saved latest-year ALI agreement scores -> %s", latest_path)
            else:
                pd.DataFrame().to_csv(latest_path)
                logger.info("output_mode=%s: skipped latest-year (placeholder written)", mode)

            if mode in ("all", "both"):
                df_all.round(args.round_decimals).to_csv(all_yrs_path, index=False)
                logger.info("Saved all-years ALI agreement scores -> %s", all_yrs_path)
            else:
                pd.DataFrame().to_csv(all_yrs_path, index=False)
                logger.info("output_mode=%s: skipped all-years (placeholder written)", mode)

            with open(args.ali_agreement_scores + ".meta.json", "w") as f:
                json.dump({
                    "path":          latest_path,
                    "output_mode":   mode,
                    "markets":       len(df_latest),
                    "fields":        len(ALI_FIELDS),
                    "regime_dim":    REGIME_DIM,
                    "round_decimals": args.round_decimals,
                }, f, indent=2)

            with open(args.ali_agreement_scores_all_years + ".meta.json", "w") as f:
                json.dump({
                    "path":          all_yrs_path,
                    "output_mode":   mode,
                    "rows":          len(df_all),
                    "fields":        len(ALI_FIELDS),
                    "regime_dim":    REGIME_DIM,
                    "round_decimals": args.round_decimals,
                }, f, indent=2)

        except Exception as e:
            logger.exception("Fatal error: %s", str(e))
            sys.exit(1)

    args:
      - --embeddings
      - {inputPath: embeddings}
      - --regime_dim
      - {inputValue: regime_dim}
      - --output_mode
      - {inputValue: output_mode}
      - --round_decimals
      - {inputValue: round_decimals}
      - --ali_agreement_scores
      - {outputPath: ali_agreement_scores}
      - --ali_agreement_scores_all_years
      - {outputPath: ali_agreement_scores_all_years}
